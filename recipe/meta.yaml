{% set name = "docxcompose" %}
{% set version = "2.0.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/docxcompose-{{ version }}.tar.gz
  sha256: 649ba37655985c093159fe899a519eee5e31bc64344610ac1a1e2d719ec41d2a

build:
  number: 0
  noarch: python
  entry_points:
    - docxcompose = docxcompose.command:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - lxml
    - python >={{ python_min }}
    - python-docx >=0.8.8
    - setuptools
    - six
    - babel

test:
  imports:
    - docxcompose
  commands:
    - pip check
    - docxcompose --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/4teamwork/docxcompose
  summary: Compose .docx documents
  license: MIT
  # manually package license file. See https://github.com/4teamwork/docxcompose/pull/74
  license_file: LICENSE

extra:
  recipe-maintainers:
    - synapticarbors
