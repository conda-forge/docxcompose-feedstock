schema_version: 1

context:
  name: docxcompose
  version: "2.0.2"
  python_min: "3.12"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/docxcompose-${{ version }}.tar.gz
  sha256: 3799c2a1e581765bd94b97fe5f88c28cf6b3ffbe13b8a35b46f42eabd7318e96

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-build-isolation --no-deps
  python:
    entry_points:
      - docxcompose = docxcompose.command:main

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - poetry-core
  run:
    - python >=${{ python_min }}
    - babel >=2,<3
    - lxml >=5,<6
    - python-docx >=1,<2
    - six >=1,<2

tests:
  - python:
      imports:
        - docxcompose
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - docxcompose --help

about:
  summary: Compose .docx documents
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/4teamwork/docxcompose

extra:
  recipe-maintainers:
    - synapticarbors
